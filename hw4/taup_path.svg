    <style type="text/css"><![CDATA[
        text.label {
            font-size: 40px;
        }
        g.phasename text {
            font-size: 40px;
        }

        .phase_P {
          stroke: skyblue;
        }
        circle.phase_P {
          fill: skyblue;
          stroke: skyblue;
        }
        .phase_P.label {
          stroke: skyblue;
          fill: skyblue;
        }
        .legend .phase_P line {
          stroke: skyblue;
        }
        .legend .phase_P text {
          fill: skyblue;
          stroke: transparent;
        }
        .label text.phase_P{
          font: bold ;
          fill: skyblue;
          stroke: transparent;
        }
        .phase_S {
          stroke: olivedrab;
        }
