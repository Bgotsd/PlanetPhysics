          fill: olivedrab;
          stroke: transparent;
        }
        .phase_PKP {
          stroke: goldenrod;
        }
        circle.phase_PKP {
          fill: goldenrod;
          stroke: goldenrod;
        }
        .phase_PKP.label {
          stroke: goldenrod;
          fill: goldenrod;
        }
        .legend .phase_PKP line {
          stroke: goldenrod;
        }
        .legend .phase_PKP text {
